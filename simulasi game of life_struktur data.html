<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game of Life</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #020c04;
    --panel: #051008;
    --green: #00ff41;
    --green-dim: #004d14;
    --green-glow: rgba(0,255,65,0.15);
    --border: #00ff4133;
    --dead: #0a1a0c;
    --alive: #00ff41;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 100;
  }

  header {
    width: 100%;
    text-align: center;
    padding: 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.2rem, 4vw, 2rem);
    font-weight: 900;
    letter-spacing: 0.3em;
    text-shadow: 0 0 20px var(--green), 0 0 40px var(--green);
    animation: flicker 4s infinite;
  }

  h1 span { color: #fff; }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.8; }
    97% { opacity: 1; }
    98% { opacity: 0.6; }
    99% { opacity: 1; }
  }

  .subtitle {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: #005a1c;
    margin-top: 4px;
  }

  .container {
    display: flex;
    gap: 0;
    width: 100%;
    max-width: 1100px;
    padding: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* MENU PANEL */
  .menu {
    width: 240px;
    flex-shrink: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .menu-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: #005a1c;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }

  .menu-btn {
    background: transparent;
    border: 1px solid var(--green-dim);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    padding: 8px 10px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    letter-spacing: 0.05em;
    position: relative;
    overflow: hidden;
  }

  .menu-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0;
    background: var(--green-glow);
    transition: width 0.2s;
  }

  .menu-btn:hover::before { width: 100%; }
  .menu-btn:hover {
    border-color: var(--green);
    color: #fff;
    box-shadow: 0 0 10px var(--green-glow);
  }

  .menu-btn:active { transform: scale(0.98); }

  .menu-btn .key {
    display: inline-block;
    background: var(--green-dim);
    color: var(--green);
    padding: 0 5px;
    margin-right: 6px;
    font-size: 0.7rem;
    border: 1px solid var(--border);
  }

  .menu-btn.danger { border-color: #4d0000; color: #ff4444; }
  .menu-btn.danger:hover { border-color: #ff4444; box-shadow: 0 0 10px rgba(255,68,68,0.2); }
  .menu-btn.danger .key { background: #4d0000; color: #ff4444; border-color: #4d0000; }

  .menu-btn.active-btn {
    border-color: var(--green);
    background: var(--green-glow);
    color: #fff;
  }

  .separator {
    border-top: 1px solid var(--border);
    margin: 6px 0;
  }

  .menu-label {
    font-size: 0.6rem;
    color: #004d14;
    letter-spacing: 0.15em;
    padding: 2px 0;
  }

  /* Speed slider */
  .slider-wrap { display: flex; align-items: center; gap: 8px; }
  input[type=range] {
    -webkit-appearance: none;
    flex: 1;
    height: 2px;
    background: var(--green-dim);
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--green);
    cursor: pointer;
    box-shadow: 0 0 6px var(--green);
  }
  .slider-val { font-size: 0.65rem; min-width: 30px; text-align: right; }

  /* Stats */
  .stats {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 0.65rem;
    color: #004d14;
    line-height: 1.8;
  }
  .stats span { color: var(--green); }

  /* CANVAS */
  .canvas-wrap {
    flex: 1;
    min-width: 300px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  canvas {
    border: 1px solid var(--border);
    cursor: crosshair;
    display: block;
    image-rendering: pixelated;
    box-shadow: 0 0 30px rgba(0,255,65,0.05) inset;
  }

  .status-bar {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: none;
    padding: 6px 12px;
    font-size: 0.65rem;
    color: #004d14;
    display: flex;
    justify-content: space-between;
  }
  .status-bar .msg { color: var(--green); }

  /* Presets tooltip */
  .preset-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    margin-top: 2px;
  }
  .preset-btn {
    background: transparent;
    border: 1px solid #003010;
    color: #005a1c;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem;
    padding: 5px 4px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .preset-btn:hover {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-glow);
  }
</style>
</head>
<body>

<header>
  <h1>GAME <span>OF</span> LIFE</h1>
  <div class="subtitle">JOHN HORTON CONWAY · 1970 · CELLULAR AUTOMATON</div>
</header>

<div class="container">
  <!-- MENU -->
  <div class="menu">
    <div class="menu-title">// KONTROL</div>

    <button class="menu-btn" id="btn-play" onclick="togglePlay()">
      <span class="key">1</span> MULAI / JEDA
    </button>
    <button class="menu-btn" onclick="step()">
      <span class="key">2</span> LANGKAH MAJU
    </button>
    <button class="menu-btn" onclick="randomize()">
      <span class="key">3</span> ACAK SEL
    </button>
    <button class="menu-btn danger" onclick="clearGrid()">
      <span class="key">4</span> HAPUS SEMUA
    </button>

    <div class="separator"></div>
    <div class="menu-label">// KECEPATAN</div>
    <div class="slider-wrap">
      <input type="range" id="speed" min="1" max="30" value="10" oninput="updateSpeed()">
      <div class="slider-val" id="speed-val">10</div>
    </div>

    <div class="separator"></div>
    <div class="menu-label">// PRESET POLA</div>
    <div class="preset-grid">
      <button class="preset-btn" onclick="loadPreset('glider')">Glider</button>
      <button class="preset-btn" onclick="loadPreset('pulsar')">Pulsar</button>
      <button class="preset-btn" onclick="loadPreset('gun')">Gosper Gun</button>
      <button class="preset-btn" onclick="loadPreset('lwss')">LWSS</button>
      <button class="preset-btn" onclick="loadPreset('blinker')">Blinker</button>
      <button class="preset-btn" onclick="loadPreset('beacon')">Beacon</button>
    </div>

    <div class="separator"></div>
    <div class="menu-label">// UKURAN SEL</div>
    <div class="slider-wrap">
      <input type="range" id="cellsize" min="4" max="20" value="8" oninput="resizeGrid()">
      <div class="slider-val" id="cell-val">8</div>
    </div>

    <div class="stats">
      GENERASI: <span id="gen">0</span><br>
      SEL HIDUP: <span id="alive-count">0</span><br>
      STATUS: <span id="status-text">BERHENTI</span>
    </div>
  </div>

  <!-- CANVAS -->
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div class="status-bar">
      <span>KLIK untuk gambar · DRAG untuk melukis</span>
      <span class="msg" id="status-msg">Siap</span>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let CELL = 8;
let cols, rows;
let grid = [];
let running = false;
let generation = 0;
let intervalId = null;
let speed = 10;
let isDrawing = false;
let drawValue = 1;

function initGrid() {
  const wrap = canvas.parentElement;
  const menuW = 240 + 32; // menu + padding
  const maxW = Math.min(window.innerWidth - menuW - 40, 800);
  const maxH = Math.min(window.innerHeight - 140, 600);
  cols = Math.floor(maxW / CELL);
  rows = Math.floor(maxH / CELL);
  canvas.width = cols * CELL;
  canvas.height = rows * CELL;
  grid = Array.from({length: rows}, () => new Uint8Array(cols));
}

function draw() {
  ctx.fillStyle = '#020c04';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = '#0a1a0c';
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= cols; c++) {
    ctx.beginPath(); ctx.moveTo(c*CELL,0); ctx.lineTo(c*CELL,canvas.height); ctx.stroke();
  }
  for (let r = 0; r <= rows; r++) {
    ctx.beginPath(); ctx.moveTo(0,r*CELL); ctx.lineTo(canvas.width,r*CELL); ctx.stroke();
  }

  let alive = 0;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (grid[r][c]) {
        alive++;
        const x = c*CELL, y = r*CELL;
        ctx.fillStyle = '#00ff41';
        ctx.fillRect(x+1, y+1, CELL-1, CELL-1);
        ctx.fillStyle = 'rgba(0,255,65,0.3)';
        ctx.fillRect(x, y, CELL, 1);
        ctx.fillRect(x, y, 1, CELL);
      }
    }
  }
  document.getElementById('alive-count').textContent = alive;
  document.getElementById('gen').textContent = generation;
}

function step() {
  const next = Array.from({length: rows}, () => new Uint8Array(cols));
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      let n = 0;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const nr = (r+dr+rows)%rows;
          const nc = (c+dc+cols)%cols;
          n += grid[nr][nc];
        }
      }
      if (grid[r][c]) {
        next[r][c] = (n === 2 || n === 3) ? 1 : 0;
      } else {
        next[r][c] = n === 3 ? 1 : 0;
      }
    }
  }
  grid = next;
  generation++;
  draw();
}

function togglePlay() {
  running = !running;
  const btn = document.getElementById('btn-play');
  if (running) {
    btn.classList.add('active-btn');
    document.getElementById('status-text').textContent = 'BERJALAN';
    document.getElementById('status-msg').textContent = 'Simulasi berjalan...';
    intervalId = setInterval(step, 1000/speed);
  } else {
    btn.classList.remove('active-btn');
    document.getElementById('status-text').textContent = 'BERHENTI';
    document.getElementById('status-msg').textContent = 'Dijeda';
    clearInterval(intervalId);
  }
}

function updateSpeed() {
  speed = parseInt(document.getElementById('speed').value);
  document.getElementById('speed-val').textContent = speed;
  if (running) {
    clearInterval(intervalId);
    intervalId = setInterval(step, 1000/speed);
  }
}

function resizeGrid() {
  CELL = parseInt(document.getElementById('cellsize').value);
  document.getElementById('cell-val').textContent = CELL;
  const wasRunning = running;
  if (running) togglePlay();
  initGrid();
  draw();
}

function randomize() {
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      grid[r][c] = Math.random() < 0.3 ? 1 : 0;
  generation = 0;
  draw();
  document.getElementById('status-msg').textContent = 'Grid diacak!';
}

function clearGrid() {
  for (let r = 0; r < rows; r++) grid[r].fill(0);
  generation = 0;
  draw();
  document.getElementById('status-msg').textContent = 'Grid dikosongkan.';
}

function placePattern(pattern, offR, offC) {
  for (const [r, c] of pattern) {
    const nr = (offR+r+rows)%rows;
    const nc = (offC+c+cols)%cols;
    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols)
      grid[nr][nc] = 1;
  }
}

const PRESETS = {
  glider: [[0,1],[1,2],[2,0],[2,1],[2,2]],
  blinker: [[0,0],[0,1],[0,2]],
  beacon: [[0,0],[0,1],[1,0],[2,3],[3,2],[3,3]],
  lwss: [[0,1],[0,4],[1,0],[2,0],[2,4],[3,0],[3,1],[3,2],[3,3]],
  pulsar: [
    [0,2],[0,3],[0,4],[0,8],[0,9],[0,10],
    [2,0],[2,5],[2,7],[2,12],
    [3,0],[3,5],[3,7],[3,12],
    [4,0],[4,5],[4,7],[4,12],
    [5,2],[5,3],[5,4],[5,8],[5,9],[5,10],
    [7,2],[7,3],[7,4],[7,8],[7,9],[7,10],
    [8,0],[8,5],[8,7],[8,12],
    [9,0],[9,5],[9,7],[9,12],
    [10,0],[10,5],[10,7],[10,12],
    [12,2],[12,3],[12,4],[12,8],[12,9],[12,10]
  ],
  gun: [
    [0,24],[1,22],[1,24],[2,12],[2,13],[2,20],[2,21],[2,34],[2,35],
    [3,11],[3,15],[3,20],[3,21],[3,34],[3,35],[4,0],[4,1],[4,10],[4,16],[4,20],[4,21],
    [5,0],[5,1],[5,10],[5,14],[5,16],[5,17],[5,22],[5,24],[6,10],[6,16],[6,24],
    [7,11],[7,15],[8,12],[8,13]
  ]
};

function loadPreset(name) {
  clearGrid();
  const pattern = PRESETS[name];
  if (!pattern) return;
  const offR = Math.floor(rows/2) - 7;
  const offC = Math.floor(cols/2) - 15;
  placePattern(pattern, offR, offC);
  generation = 0;
  draw();
  document.getElementById('status-msg').textContent = `Pola "${name}" dimuat!`;
}

// Mouse drawing
function getCell(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  return [Math.floor(y/CELL), Math.floor(x/CELL)];
}

canvas.addEventListener('mousedown', e => {
  const [r, c] = getCell(e);
  if (r >= 0 && r < rows && c >= 0 && c < cols) {
    drawValue = grid[r][c] ? 0 : 1;
    grid[r][c] = drawValue;
    draw();
    isDrawing = true;
  }
});

canvas.addEventListener('mousemove', e => {
  if (!isDrawing) return;
  const [r, c] = getCell(e);
  if (r >= 0 && r < rows && c >= 0 && c < cols) {
    grid[r][c] = drawValue;
    draw();
  }
});

window.addEventListener('mouseup', () => isDrawing = false);

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.key) {
    case '1': togglePlay(); break;
    case '2': step(); break;
    case '3': randomize(); break;
    case '4': clearGrid(); break;
  }
});

// Init
initGrid();
randomize();
</script>
</body>
</html>
